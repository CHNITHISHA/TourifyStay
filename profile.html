<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar px-4 d-flex justify-content-between align-items-center">

  <h4 class="m-0">TourifyStay</h4>

  <div class="d-flex align-items-center gap-2">
    <a href="index.html" class="btn btn-outline-dark btn-sm">Home</a>
    <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
  </div>

</nav>

<!-- MAIN PROFILE -->
<div class="container mt-5">

  <div class="card p-4 text-center mb-4">
    <img src="images/logo.png" class="logo mb-2">
    <h4>My Account</h4>
    <p id="profileName"></p>
  </div>

  <!-- WISHLIST -->
  <div class="card p-4 mb-4">
    <h5>❤️ Wishlist</h5>
    <div id="wishlist" class="row mt-3"></div>
  </div>

  <!-- BOOKING HISTORY -->
  <div class="card p-4">
    <h5>📖 Booking History</h5>
    <div id="history" class="row mt-3"></div>
  </div>

</div>

<script>
// username
document.getElementById("profileName").innerText =
  localStorage.getItem("username") || "Guest";

// data
const wish = JSON.parse(localStorage.getItem("wishlist")) || [];
const hist = JSON.parse(localStorage.getItem("bookings")) || [];

// wishlist display
wish.forEach(item=>{
  document.getElementById("wishlist").innerHTML += `
    <div class="col-md-4 mb-3">
      <div class="card p-3 text-center">
        <h6>${item.title}</h6>
        <p>₹${item.price}</p>
      </div>
    </div>`;
});

// history display
hist.forEach(item=>{
  document.getElementById("history").innerHTML += `
    <div class="col-md-4 mb-3">
      <div class="card p-3 text-center">
        <h6>${item.title}</h6>
        <p>₹${item.price}</p>
      </div>
    </div>`;
});

// logout
function logout(){
  localStorage.removeItem("user");
  localStorage.removeItem("username");
  window.location="login.html";
}
</script>

</body>
</html>
