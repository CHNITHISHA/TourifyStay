<!DOCTYPE html>
<html>
<head>
<title>Stay Details</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<div class="container">

<h2 id="title"></h2>

<img id="img" class="img-fluid mb-3">

<p id="info"></p>
<h4 id="price"></h4>

<input type="date" id="checkin" class="form-control mb-2">
<input type="date" id="checkout" class="form-control mb-3">

<iframe id="map" width="100%" height="300"></iframe>

<button class="btn btn-success mt-3" onclick="book()">Book Now</button>

</div>

<script>
const data = JSON.parse(localStorage.getItem("selected"));

document.getElementById("title").innerText = data.title;
document.getElementById("img").src = data.image;
document.getElementById("price").innerText = "₹" + data.price;
document.getElementById("info").innerText =
`${data.city} • ${data.distance} km • ⭐ ${data.rating}`;

document.getElementById("map").src =
`https://maps.google.com/maps?q=${data.city}&output=embed`;

function book(){
  let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

  bookings.push(data);
  localStorage.setItem("bookings", JSON.stringify(bookings));

  alert("Booking Confirmed ✅");
}
</script>

</body>
</html>
