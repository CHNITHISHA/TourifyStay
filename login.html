<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Correct CSS path -->
<link rel="stylesheet" href="css/style.css">

</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 login-card text-center">

  <!-- LOGO with correct path -->
  <img src="images/logo.png" class="logo mb-2" alt="Logo">

  <h4 class="mb-3">TourifyStay</h4>

  <input id="email" class="form-control mb-2" placeholder="Email">
  <input id="pass" type="password" class="form-control mb-3" placeholder="Password">

  <button onclick="login()" class="btn btn-primary w-100 mb-2">Login</button>

  <p>Don't have account? 
    <a href="signup.html">Signup</a>
  </p>
</div>

<script>
// redirect if already logged in
if(localStorage.getItem("user")){
  window.location="index.html";
}

function login(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  const users = JSON.parse(localStorage.getItem("users")) || [];

  const validUser = users.find(u => u.email === email && u.pass === pass);

  if(validUser){
    localStorage.setItem("user", email);
    localStorage.setItem("username", validUser.name);
    window.location="index.html";
  } else {
    alert("Invalid credentials");
  }
}
</script>

</body>
</html>
