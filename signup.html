<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card p-4" style="width:320px">
  <h4 class="text-center mb-3">Create Account</h4>

  <input id="name" class="form-control mb-2" placeholder="Name">
  <input id="email" class="form-control mb-2" placeholder="Email">
  <input id="pass" type="password" class="form-control mb-3" placeholder="Password">

  <button onclick="signup()" class="btn btn-success w-100 mb-2">Signup</button>

  <p class="text-center">Already have account? 
    <a href="login.html">Login</a>
  </p>
</div>

<script>
function signup(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  if(!name || !email || !pass){
    alert("Fill all fields");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  users.push({name,email,pass});
  localStorage.setItem("users", JSON.stringify(users));

  alert("Signup successful!");
  window.location="login.html";
}
</script>

</body>
</html>
