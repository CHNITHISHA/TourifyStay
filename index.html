<!DOCTYPE html>
<html>
<head>
<title>TourifyStay</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar px-4 d-flex justify-content-between align-items-center">

  <h4 class="m-0">TourifyStay</h4>

  <div class="d-flex align-items-center gap-2">

    <span id="welcomeUser" class="fw-bold"></span>

    <button onclick="toggleDark()" class="btn btn-light btn-sm">🌙</button>

    <a href="profile.html" class="btn btn-outline-dark btn-sm">Profile</a>

    <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>

  </div>

</nav>


<div class="container mt-4">
  <div class="row g-2">

    <div class="col-md-3">
      <select id="city" class="form-control">
        <option value="">City</option>
        <option>Mumbai</option>
        <option>Delhi</option>
        <option>Hyderabad</option>
        <option>Bangalore</option>
      </select>
    </div>

    <div class="col-md-3">
      <input id="price" class="form-control" placeholder="Max Price">
    </div>

    <div class="col-md-3">
      <select id="type" class="form-control">
        <option value="">Stay Type</option>
        <option>Day</option>
        <option>Night</option>
      </select>
    </div>

    <div class="col-md-3">
      <button onclick="search()" class="btn btn-primary w-100">Search</button>
    </div>

  </div>
</div>

<div class="container mt-4">
  <div class="row" id="listings"></div>
</div>

<script src="js/script.js"></script>
</body>
</html>
